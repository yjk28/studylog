<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyLog - 스터디 플래너</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
    h1 { color: #6c63ff; }
    .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>📚 StudyLog</h1>
  <div class="card">
    <h2>환영합니다!</h2>
    <p>StudyLog 스터디 플래너가 실행 중입니다.</p>
    <p>API 엔드포인트:</p>
    <ul>
      <li>GET /api/users - 사용자 목록</li>
      <li>POST /api/login - 로그인</li>
      <li>POST /api/register - 회원가입</li>
    </ul>
  </div>
</body>
</html>
